<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行事曆</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      background: #f0f4f8;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #3b82f6;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    header h1 { font-size: 1.5rem; letter-spacing: 1px; }

    #notify-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.5);
      color: white;
      padding: 0.4rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    #notify-btn:hover { background: rgba(255,255,255,0.3); }

    .container {
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 1.5rem;
    }

    /* Calendar */
    .calendar-box {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .cal-header {
      background: #3b82f6;
      color: white;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cal-header h2 { font-size: 1.2rem; }

    .cal-nav {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 32px; height: 32px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .cal-nav:hover { background: rgba(255,255,255,0.35); }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: #e5e7eb;
    }

    .cal-dow {
      background: #f9fafb;
      text-align: center;
      padding: 0.5rem 0;
      font-size: 0.78rem;
      font-weight: 600;
      color: #6b7280;
    }

    .cal-day {
      background: white;
      min-height: 80px;
      padding: 4px;
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
    }
    .cal-day:hover { background: #eff6ff; }
    .cal-day.other-month { background: #fafafa; }
    .cal-day.other-month .day-num { color: #d1d5db; }
    .cal-day.today { background: #eff6ff; }
    .cal-day.today .day-num {
      background: #3b82f6;
      color: white;
      border-radius: 50%;
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
    }
    .cal-day.selected { outline: 2px solid #3b82f6; }

    .day-num {
      font-size: 0.85rem;
      font-weight: 500;
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
    }

    .day-events { margin-top: 2px; }
    .day-dot {
      font-size: 0.7rem;
      background: #3b82f6;
      color: white;
      border-radius: 4px;
      padding: 1px 4px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }
    .day-dot.priority-high { background: #ef4444; }
    .day-dot.priority-medium { background: #f59e0b; }
    .day-dot.priority-low { background: #10b981; }
    .day-dot.status-done { opacity: 0.45; text-decoration: line-through; }

    .status-badge {
      font-size: 0.7rem;
      padding: 1px 7px;
      border-radius: 10px;
      font-weight: 500;
      display: inline-block;
      margin-top: 3px;
    }
    .status-todo  { background: #f3f4f6; color: #6b7280; }
    .status-doing { background: #dbeafe; color: #1d4ed8; }
    .status-done  { background: #d1fae5; color: #065f46; }

    .event-title.crossed { text-decoration: line-through; color: #9ca3af; }

    .status-select {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 2px 4px;
      font-size: 0.75rem;
      color: #374151;
      cursor: pointer;
      background: white;
      flex-shrink: 0;
      align-self: center;
    }

    /* Sidebar */
    .sidebar { display: flex; flex-direction: column; gap: 1rem; }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 1.2rem;
    }

    .card h3 {
      font-size: 1rem;
      color: #374151;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #e5e7eb;
    }

    .form-group { margin-bottom: 0.8rem; }
    .form-group label { display: block; font-size: 0.82rem; color: #6b7280; margin-bottom: 0.3rem; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 0.5rem 0.7rem;
      font-size: 0.9rem;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      outline: none;
      border-color: #3b82f6;
    }
    .form-group textarea { resize: vertical; min-height: 60px; }

    #add-btn {
      width: 100%;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.6rem;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    #add-btn:hover { background: #2563eb; }

    /* Event list */
    #event-list { max-height: 320px; overflow-y: auto; }
    .event-item {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .event-item:last-child { border-bottom: none; }

    .event-color {
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }
    .event-info { flex: 1; min-width: 0; }
    .event-title { font-size: 0.9rem; font-weight: 500; }
    .event-date { font-size: 0.75rem; color: #9ca3af; }
    .event-desc { font-size: 0.78rem; color: #6b7280; margin-top: 2px; }

    .del-btn {
      background: none;
      border: none;
      color: #d1d5db;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 2px;
      line-height: 1;
    }
    .del-btn:hover { color: #ef4444; }

    .empty-msg { color: #9ca3af; font-size: 0.85rem; text-align: center; padding: 1rem 0; }

    /* Modal */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      width: 340px;
      max-width: 90vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    #modal h3 { margin-bottom: 1rem; color: #374151; }
    #modal-events { max-height: 300px; overflow-y: auto; }
    #modal-close {
      margin-top: 1rem;
      width: 100%;
      background: #f3f4f6;
      border: none;
      border-radius: 8px;
      padding: 0.5rem;
      cursor: pointer;
      font-size: 0.9rem;
      color: #374151;
    }
    #modal-close:hover { background: #e5e7eb; }

    @media (max-width: 700px) {
      .container { grid-template-columns: 1fr; }
      .cal-day { min-height: 55px; }
    }
  </style>
</head>
<body>
<header>
  <h1>📅 我的行事曆</h1>
  <button id="notify-btn" onclick="requestNotify()">開啟提醒通知</button>
</header>

<div class="container">
  <!-- Calendar -->
  <div class="calendar-box">
    <div class="cal-header">
      <button class="cal-nav" id="prev">&#8249;</button>
      <h2 id="month-label"></h2>
      <button class="cal-nav" id="next">&#8250;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Add event form -->
    <div class="card">
      <h3>新增事件</h3>
      <div class="form-group">
        <label>標題 *</label>
        <input type="text" id="ev-title" placeholder="事件標題">
      </div>
      <div class="form-group">
        <label>日期 *</label>
        <input type="date" id="ev-date">
      </div>
      <div class="form-group">
        <label>時間</label>
        <input type="time" id="ev-time">
      </div>
      <div class="form-group">
        <label>優先度</label>
        <select id="ev-priority">
          <option value="medium">一般</option>
          <option value="high">重要</option>
          <option value="low">次要</option>
        </select>
      </div>
      <div class="form-group">
        <label>狀態</label>
        <select id="ev-status">
          <option value="todo">待辦</option>
          <option value="doing">進行中</option>
          <option value="done">已完成</option>
        </select>
      </div>
      <div class="form-group">
        <label>備註</label>
        <textarea id="ev-desc" placeholder="可選填..."></textarea>
      </div>
      <button id="add-btn">+ 新增事件</button>
    </div>

    <!-- Upcoming events -->
    <div class="card">
      <h3>即將到來的事件</h3>
      <div id="event-list"></div>
    </div>
  </div>
</div>

<!-- Day modal -->
<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title"></h3>
    <div id="modal-events"></div>
    <button id="modal-close">關閉</button>
  </div>
</div>

<script>
  // ── Storage ──────────────────────────────────────────
  function loadEvents() {
    return JSON.parse(localStorage.getItem('cal_events') || '[]');
  }
  function saveEvents(evs) {
    localStorage.setItem('cal_events', JSON.stringify(evs));
  }

  // ── Status ────────────────────────────────────────────
  const STATUS_LABELS = { todo: '待辦', doing: '進行中', done: '已完成' };
  const STATUS_CLASS  = { todo: 'status-todo', doing: 'status-doing', done: 'status-done' };

  // ── State ─────────────────────────────────────────────
  let events = loadEvents();
  const today = new Date();
  let viewYear = today.getFullYear();
  let viewMonth = today.getMonth();
  let selectedDate = null;

  // ── Calendar render ───────────────────────────────────
  const DOW = ['日','一','二','三','四','五','六'];
  const MONTHS = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

  function dateKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function renderCal() {
    document.getElementById('month-label').textContent = `${viewYear} 年 ${MONTHS[viewMonth]}`;
    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';

    // Day of week headers
    DOW.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-dow';
      el.textContent = d;
      grid.appendChild(el);
    });

    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
    const daysInPrev = new Date(viewYear, viewMonth, 0).getDate();
    const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

    for (let i = 0; i < totalCells; i++) {
      const cell = document.createElement('div');
      cell.className = 'cal-day';
      let y = viewYear, m = viewMonth, d;

      if (i < firstDay) {
        d = daysInPrev - firstDay + i + 1;
        m = viewMonth - 1;
        if (m < 0) { m = 11; y--; }
        cell.classList.add('other-month');
      } else if (i >= firstDay + daysInMonth) {
        d = i - firstDay - daysInMonth + 1;
        m = viewMonth + 1;
        if (m > 11) { m = 0; y++; }
        cell.classList.add('other-month');
      } else {
        d = i - firstDay + 1;
      }

      const key = dateKey(y, m, d);
      const isToday = (y === today.getFullYear() && m === today.getMonth() && d === today.getDate());
      if (isToday) cell.classList.add('today');
      if (key === selectedDate) cell.classList.add('selected');

      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = d;
      cell.appendChild(numEl);

      // Events dots
      const dayEvs = events.filter(e => e.date === key);
      const dotsEl = document.createElement('div');
      dotsEl.className = 'day-events';
      dayEvs.slice(0,3).forEach(ev => {
        const dot = document.createElement('div');
        const isDone = (ev.status || 'todo') === 'done';
        dot.className = `day-dot priority-${ev.priority}${isDone ? ' status-done' : ''}`;
        dot.textContent = (ev.time ? ev.time + ' ' : '') + ev.title;
        dotsEl.appendChild(dot);
      });
      if (dayEvs.length > 3) {
        const more = document.createElement('div');
        more.className = 'day-dot';
        more.style.background = '#6b7280';
        more.textContent = `+${dayEvs.length - 3} 更多`;
        dotsEl.appendChild(more);
      }
      cell.appendChild(dotsEl);

      cell.addEventListener('click', () => {
        selectedDate = key;
        document.getElementById('ev-date').value = key;
        renderCal();
        if (dayEvs.length > 0) openModal(key, dayEvs);
      });

      grid.appendChild(cell);
    }
  }

  // ── Modal ─────────────────────────────────────────────
  let modalDateKey = null;

  function renderModalEvents(container, dayEvs) {
    container.innerHTML = '';
    const colors = { high:'#ef4444', medium:'#3b82f6', low:'#10b981' };
    dayEvs.forEach(ev => {
      const st = ev.status || 'todo';
      const item = document.createElement('div');
      item.className = 'event-item';
      item.innerHTML = `
        <div class="event-color" style="background:${colors[ev.priority]}"></div>
        <div class="event-info">
          <div class="event-title${st === 'done' ? ' crossed' : ''}">${escHtml(ev.title)}</div>
          <div class="event-date">${ev.time || '全天'}</div>
          ${ev.desc ? `<div class="event-desc">${escHtml(ev.desc)}</div>` : ''}
          <span class="status-badge ${STATUS_CLASS[st]}">${STATUS_LABELS[st]}</span>
        </div>
        <select class="status-select" onchange="updateStatus('${ev.id}', this.value)">
          <option value="todo"  ${st==='todo'  ? 'selected':''}>待辦</option>
          <option value="doing" ${st==='doing' ? 'selected':''}>進行中</option>
          <option value="done"  ${st==='done'  ? 'selected':''}>已完成</option>
        </select>
        <button class="del-btn" onclick="deleteEvent('${ev.id}')">✕</button>
      `;
      container.appendChild(item);
    });
  }

  function openModal(key, dayEvs) {
    const [y, m, d] = key.split('-');
    modalDateKey = key;
    document.getElementById('modal-title').textContent =
      `${y}年${parseInt(m)}月${parseInt(d)}日 的事件`;
    renderModalEvents(document.getElementById('modal-events'), dayEvs);
    document.getElementById('modal-overlay').classList.add('open');
  }

  document.getElementById('modal-close').onclick = () =>
    document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal-overlay').onclick = (e) => {
    if (e.target === document.getElementById('modal-overlay'))
      document.getElementById('modal-overlay').classList.remove('open');
  };

  // ── Add event ─────────────────────────────────────────
  document.getElementById('add-btn').onclick = () => {
    const title = document.getElementById('ev-title').value.trim();
    const date  = document.getElementById('ev-date').value;
    const time  = document.getElementById('ev-time').value;
    const prio  = document.getElementById('ev-priority').value;
    const desc  = document.getElementById('ev-desc').value.trim();

    if (!title || !date) {
      alert('請填寫標題和日期！');
      return;
    }

    const status = document.getElementById('ev-status').value;
    const ev = { id: Date.now().toString(), title, date, time, priority: prio, desc, status };
    events.push(ev);
    saveEvents(events);
    scheduleNotify(ev);

    document.getElementById('ev-title').value = '';
    document.getElementById('ev-time').value = '';
    document.getElementById('ev-desc').value = '';
    document.getElementById('ev-status').value = 'todo';

    renderCal();
    renderList();
  };

  // ── Update status ─────────────────────────────────────
  function updateStatus(id, newStatus) {
    const ev = events.find(e => e.id === id);
    if (!ev) return;
    ev.status = newStatus;
    saveEvents(events);
    renderCal();
    renderList();
    // Refresh modal if still open
    const overlay = document.getElementById('modal-overlay');
    if (overlay.classList.contains('open') && modalDateKey) {
      const dayEvs = events.filter(e => e.date === modalDateKey);
      renderModalEvents(document.getElementById('modal-events'), dayEvs);
    }
  }

  // ── Delete event ──────────────────────────────────────
  function deleteEvent(id) {
    events = events.filter(e => e.id !== id);
    saveEvents(events);
    document.getElementById('modal-overlay').classList.remove('open');
    renderCal();
    renderList();
  }

  // ── Upcoming list ─────────────────────────────────────
  function renderList() {
    const el = document.getElementById('event-list');
    const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());
    const upcoming = events
      .filter(e => e.date >= todayKey)
      .sort((a,b) => (a.date+a.time) < (b.date+b.time) ? -1 : 1)
      .slice(0, 10);

    if (!upcoming.length) {
      el.innerHTML = '<div class="empty-msg">目前沒有即將到來的事件</div>';
      return;
    }

    const colors = { high:'#ef4444', medium:'#3b82f6', low:'#10b981' };
    el.innerHTML = upcoming.map(ev => {
      const st = ev.status || 'todo';
      return `
      <div class="event-item">
        <div class="event-color" style="background:${colors[ev.priority]}"></div>
        <div class="event-info">
          <div class="event-title${st === 'done' ? ' crossed' : ''}">${escHtml(ev.title)}</div>
          <div class="event-date">${formatDate(ev.date)}${ev.time ? ' ' + ev.time : ''}</div>
          ${ev.desc ? `<div class="event-desc">${escHtml(ev.desc)}</div>` : ''}
          <span class="status-badge ${STATUS_CLASS[st]}">${STATUS_LABELS[st]}</span>
        </div>
        <select class="status-select" onchange="updateStatus('${ev.id}', this.value)">
          <option value="todo"  ${st==='todo'  ? 'selected':''}>待辦</option>
          <option value="doing" ${st==='doing' ? 'selected':''}>進行中</option>
          <option value="done"  ${st==='done'  ? 'selected':''}>已完成</option>
        </select>
        <button class="del-btn" onclick="deleteEvent('${ev.id}')">✕</button>
      </div>
    `}).join('');
  }

  // ── Notifications ─────────────────────────────────────
  function requestNotify() {
    if (!('Notification' in window)) { alert('此瀏覽器不支援通知功能'); return; }
    Notification.requestPermission().then(p => {
      if (p === 'granted') {
        document.getElementById('notify-btn').textContent = '✓ 通知已開啟';
        events.forEach(scheduleNotify);
      }
    });
  }

  function scheduleNotify(ev) {
    if (Notification.permission !== 'granted' || !ev.time) return;
    const dt = new Date(`${ev.date}T${ev.time}`);
    const remind = dt.getTime() - 15 * 60 * 1000; // 15 min before
    const delay = remind - Date.now();
    if (delay > 0) {
      setTimeout(() => {
        new Notification(`📅 即將到來：${ev.title}`, {
          body: `15 分鐘後 (${ev.time})${ev.desc ? '\n' + ev.desc : ''}`,
          icon: ''
        });
      }, delay);
    }
  }

  // ── Utils ─────────────────────────────────────────────
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatDate(key) {
    const [y, m, d] = key.split('-');
    return `${parseInt(m)}月${parseInt(d)}日`;
  }

  // ── Nav ───────────────────────────────────────────────
  document.getElementById('prev').onclick = () => {
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    renderCal();
  };
  document.getElementById('next').onclick = () => {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    renderCal();
  };

  // ── Init ──────────────────────────────────────────────
  document.getElementById('ev-date').value = dateKey(today.getFullYear(), today.getMonth(), today.getDate());
  if (Notification.permission === 'granted') {
    document.getElementById('notify-btn').textContent = '✓ 通知已開啟';
    events.forEach(scheduleNotify);
  }
  renderCal();
  renderList();
</script>
</body>
</html>
